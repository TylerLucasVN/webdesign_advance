<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Products Layout</title>
    <link rel="stylesheet" href="style.css">    
    
</head>
<body>

    <div class="container">
        <div class="top-nav">
            <h2 class="section-title">WOMEN'S PRODUCTS</h2>
            <nav class="menu-links">
                <a href="#">All</a>
                <a href="#">Clothings</a>
                <a href="#">Bags</a>
                <a href="#">Shoes</a>
                <a href="#">Watches</a>
                <a href="#">Googles</a>
            </nav>
        </div>

        <div class="content-wrapper">
            <div class="products-grid">
                <div class="product-card">
                    <div class="img-container">
                        <img src="https://images.pexels.com/photos/16458431/pexels-photo-16458431.jpeg" alt="Women Bags">
                    </div>
                    <h3>Women Bags</h3>
                    <div class="price">
                        <span class="old-price">€100.00</span>
                        <span class="current-price">€50.00</span>
                    </div>
                    <button class="btn-add">ADD TO CART</button>
                </div>

                <div class="product-card">
                    <div class="img-container">
                        <img src="https://images.pexels.com/photos/14352080/pexels-photo-14352080.jpeg" alt="Google">
                    </div>
                    <h3>Google</h3> <div class="price">
                        <span class="current-price" style=" display:block">€25.00</span>
                    </div>
                    <button class="btn-add">ADD TO CART</button>
                </div>
            </div>

            <div class="banner-large">
                <div class="banner-content">
                    <h2>FOR WOMEN</h2>
                    <button class="btn-view-all">VIEW ALL</button>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
